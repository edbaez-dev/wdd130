<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
      content="Contact White Water Rafting Company - reach out to us for reservations, inquiries, and information about our thrilling rafting adventures.">
    <meta name="author" content="Eduardo Baez">
    <title>Contact Us - White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Company Info -->
        <div class="contact-info">
            <h1>White Water Rafting Company</h1>
            <address>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p><a href="mailto:info@whitewater.com">info@whitewater.com</a></p>
            </address>
        </div>

        <!-- Map + Form Layout -->
        <div class="contact-layout">

            <!-- Google Map -->
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3048.123456789!2d-113.0263!3d37.2967!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzfCsDE3JzQ4LjEiTiAxMTPCsDAxJzM0LjciVw!5e0!3m2!1sen!2sus!4v1234567890"
                  height="400" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="White Water Rafting Company Location">
                </iframe>
            </div>

            <!-- Contact Form -->
            <div class="form-container">
                <form action="#" method="post">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your full name"
                          required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com"
                          required>
                    </div>

                    <div class="form-group">
                        <label>Message Purpose</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" id="general" name="purpose" value="general"
                                  checked>
                                General Inquiry
                            </label>
                            <label>
                                <input type="radio" id="reservation" name="purpose"
                                  value="reservation">
                                Reservation Question
                            </label>
                            <label>
                                <input type="radio" id="suggestion" name="purpose"
                                  value="suggestion">
                                Website Suggestion
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here"
                          required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>
        </div>

        <!-- Employee Section -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-layout">
                <figure>
                    <img src="images/employee1.jpg" alt="Sarah Johnson - Head Guide">
                    <figcaption>Sarah Johnson - Head Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Mark Rivera - Safety Officer">
                    <figcaption>Mark Rivera - Safety Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Lisa Chen - Trip Coordinator">
                    <figcaption>Lisa Chen - Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Company - Eduardo Baez</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
